[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/about.html"
  to = "/about"
  status = 301

[[redirects]]
  from = "/contact.html"
  to = "/contact"
  status = 301

[[redirects]]
  from = "/records.html"
  to = "/records"
  status = 301

[[redirects]]
  from = "/vision.html"
  to = "/vision"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
