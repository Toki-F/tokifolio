    const projectsContainer = document.getElementById('projectsContainer');
    const modal = document.getElementById('projectModal');
    const closeModal = document.getElementById('closeModal');
    const modalMedia = document.getElementById('modalMedia');
    const modalTitle = document.getElementById('modalTitle');
    const modalYear = document.getElementById('modalYear');
    const modalDescription = document.getElementById('modalDescription');

    function createProjectElement(project) {
        const projectElement = document.createElement('div');
        projectElement.className = 'project-item';
        projectElement.innerHTML = `
            <img src="${project.image}" alt="${project.title}" class="project-image">
            <div class="project-info">
                <h2 class="project-title">${project.title}</h2>
                <p class="project-year">${project.year}</p>
                <p class="project-description">${project.description}</p>
            </div>
        `;
        projectElement.addEventListener('click', () => openModal(project));
        return projectElement;
    }

    function openModal(project) {
        const mediaItems = [];
        if (project.video) {
            mediaItems.push({ type: 'video', src: project.video });
        }
        if (project.images) {
            project.images.forEach(img => mediaItems.push({ type: 'image', src: img }));
        }
        if (mediaItems.length === 0) {
            mediaItems.push({ type: 'image', src: project.image });
        }

        showMedia(project, mediaItems, 0);

        modalTitle.textContent = project.title;
        modalYear.textContent = project.year;
        modalDescription.innerHTML = project.detailedDescription;
        modal.style.display = 'block';
    }

    function showMedia(project, mediaItems, index) {
        modalMedia.innerHTML = '';
        const currentItem = mediaItems[index];

        if (currentItem.type === 'video') {
            modalMedia.innerHTML = `
                <video class="modal-media" controls>
                    <source src="${currentItem.src}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            `;
        } else {
            modalMedia.innerHTML = `<img src="${currentItem.src}" alt="${project.title}" class="modal-media">`;
        }

        if (mediaItems.length > 1) {
            const prevButton = document.createElement('button');
            prevButton.textContent = '←';
            prevButton.className = 'navigation-button prev-button';
            prevButton.addEventListener('click', (e) => {
                e.stopPropagation();
                const newIndex = (index - 1 + mediaItems.length) % mediaItems.length;
                showMedia(project, mediaItems, newIndex);
            });

            const nextButton = document.createElement('button');
            nextButton.textContent = '→';
            nextButton.className = 'navigation-button next-button';
            nextButton.addEventListener('click', (e) => {
                e.stopPropagation();
                const newIndex = (index + 1) % mediaItems.length;
                showMedia(project, mediaItems, newIndex);
            });

            modalMedia.appendChild(prevButton);
            modalMedia.appendChild(nextButton);
        }
    }

    closeModal.onclick = function() {
        modal.style.display = 'none';
    }

    window.onclick = function(event) {
        if (event.target == modal) {
            modal.style.display = 'none';
        }
    }

    projects.forEach(project => {
        projectsContainer.appendChild(createProjectElement(project));
    });
</script>
