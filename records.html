<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="福本深稀のポートフォリオサイト。Built with v0.">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta property="og:title" content="福本深稀のポートフォリオ">
<meta property="og:description" content="福本深稀のポートフォリオサイト。Built with v0.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://tokifolio.net">
<meta property="og:image" content="https://res.cloudinary.com/dzopbb2j8/image/upload/v1736466570/nlxd3yprc3suj164xt5r.webp">
<title>Toki Fukumoto - Portfolio</title>
<style>
    body {
        font-family: 'Arial', sans-serif;
        background-color: #e8e8e8;
        color: #333;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
    }

    header {
        background-color: #f0f0f0;
        padding: 20px 0;
        position: relative;
        overflow: hidden;
    }

    header::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(to bottom right, transparent, #e0e0e0);
        animation: rotate 20s linear infinite;
        z-index: 1;
    }

    header .container {
        position: relative;
        z-index: 2;
    }

    footer {
        background-color: #333;
        color: #fff;
        text-align: center;
        padding: 20px 0;
        margin-top: 40px;
    }

    h1 {
        font-size: 2.5em;
        margin-bottom: 10px;
    }

    nav ul {
            list-style-type: none;
            padding: 0;
        }

    nav ul li {
        display: inline;
        margin-right: 20px;
    }

    nav ul li a {
        color: #333;
        text-decoration: none;
        transition: color 0.3s ease;
    }

    nav ul li a:hover {
        color: #007bff;
    }

    .projects-container {
        display: flex;
        flex-direction: column;
        gap: 40px;
        padding: 40px 0;
    }

    .project-item {
        display: flex;
        background-color: #f8f8f8;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        cursor: pointer;
    }

    .project-item:hover {
        transform: translateY(-5px);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }

    .project-image {
        width: 200px;
        height: 200px;
        object-fit: cover;
    }

    .project-info {
        padding: 20px;
        flex-grow: 1;
    }

    .project-title {
        font-size: 1.5em;
        margin: 0 0 10px 0;
    }

    .project-year {
        font-size: 1em;
        color: #666;
        margin: 0 0 10px 0;
    }

    .project-description {
        font-size: 1em;
        line-height: 1.5;
    }

    .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        inset: 0;
        background-color: rgba(0, 0, 0, 0.55);
        align-items: center;
        justify-content: center;
        padding: 16px;
        box-sizing: border-box;
    }

    .modal.is-open {
        display: flex;
    }

    .modal-content {
        background-color: #fff;
        padding: 48px 24px 24px;
        border-radius: 10px;
        width: 100%;
        max-width: 800px;
        max-height: calc(100vh - 32px);
        overflow-y: auto;
        position: relative;
        box-sizing: border-box;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .close-button {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        line-height: 1;
        cursor: pointer;
        border: none;
        background: #f0f0f0;
        border-radius: 50%;
        color: #333;
        padding: 0;
        z-index: 10;
        transition: background-color 0.2s ease;
    }

    .close-button:hover {
        background: #e0e0e0;
    }

    .modal-media-wrapper {
        position: relative;
        width: 100%;
        min-height: 280px;
        margin-bottom: 20px;
        background-color: #f5f5f5;
        border-radius: 8px;
        overflow: hidden;
    }

    .modal-media-inner {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 280px;
    }

    .modal-media {
        display: block;
        width: 100%;
        max-height: min(420px, 50vh);
        object-fit: contain;
        opacity: 0;
        transition: opacity 0.25s ease;
    }

    .modal-media.is-loaded {
        opacity: 1;
    }

    .modal-loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: rgba(245, 245, 245, 0.92);
        z-index: 2;
        transition: opacity 0.25s ease;
    }

    .modal-loading.is-hidden {
        opacity: 0;
        pointer-events: none;
    }

    .spinner {
        width: 44px;
        height: 44px;
        border: 3px solid #e0e0e0;
        border-top-color: #007bff;
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    .modal-media-counter {
        position: absolute;
        bottom: 10px;
        right: 12px;
        background-color: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-size: 0.85em;
        padding: 4px 10px;
        border-radius: 12px;
        z-index: 3;
        pointer-events: none;
    }

    .modal-title {
        font-size: 1.75em;
        margin: 0 0 8px 0;
        padding-right: 32px;
    }

    .modal-year {
        font-size: 1.1em;
        color: #666;
        margin: 0 0 16px 0;
    }

    .modal-description {
        font-size: 1em;
        line-height: 1.6;
        margin: 0;
    }

    .modal-description h4 {
        margin: 1.2em 0 0.4em;
    }

    .modal-description h4:first-child {
        margin-top: 0;
    }

    .navigation-button {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background-color: rgba(0, 0, 0, 0.5);
        color: white;
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
        z-index: 4;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        transition: background-color 0.2s ease;
    }

    .navigation-button:hover {
        background-color: rgba(0, 0, 0, 0.7);
    }

    .prev-button {
        left: 12px;
    }

    .next-button {
        right: 12px;
    }

    /* Sci-fi ring styles */
    .sci-fi-ring {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        z-index: -1;
    }

    .ring-left-1 {
        width: 600px;
        height: 600px;
        top: -100px;
        left: -200px;
        border: 20px dashed rgba(64, 64, 64, 0.15);
        animation: rotate 60s linear infinite;
    }

    .ring-left-2 {
        width: 400px;
        height: 400px;
        bottom: -50px;
        left: -100px;
        border: 15px dashed rgba(64, 64, 64, 0.1);
        animation: rotate 45s linear infinite reverse;
    }

    .ring-right-1 {
        width: 700px;
        height: 700px;
        top: -150px;
        right: -250px;
        border: 25px dashed rgba(64, 64, 64, 0.12);
        animation: rotate 55s linear infinite reverse;
    }

    .ring-right-2 {
        width: 500px;
        height: 500px;
        bottom: -100px;
        right: -150px;
        border: 18px dashed rgba(64, 64, 64, 0.08);
        animation: rotate 50s linear infinite;
    }

    a {
        color: #333;
        text-decoration: none;
        transition: color 0.3s ease;
    }

    a:hover {
        color: #007bff;
    }

    @keyframes rotate {
        0% {
            transform: rotate(0deg);
        }
        100% {
            transform: rotate(360deg);
        }
    }

    @media (max-width: 768px) {
        .project-item {
            flex-direction: column;
        }

        .project-image {
            width: 100%;
            height: 200px;
        }

        .modal-content {
            padding: 44px 16px 16px;
        }

        .modal-media-wrapper {
            min-height: 200px;
        }

        .modal-media-inner {
            min-height: 200px;
        }

        .modal-media {
            max-height: min(280px, 40vh);
        }

        .navigation-button {
            width: 36px;
            height: 36px;
            font-size: 16px;
        }

        .prev-button {
            left: 8px;
        }

        .next-button {
            right: 8px;
        }
    }
</style>
</head>
<body>
